<app-main-layout>
  <div class="page-header">
    <div>
      <p class="eyebrow">Tickets</p>
      <h1>Vista de tabla</h1>
      <p class="subtitle">Filtra y ordena rápidamente.</p>
    </div>
  </div>

  <div class="filters">
    <p-select
      [options]="statuses"
      optionLabel="label"
      optionValue="value"
      placeholder="Estado"
      [ngModel]="statusFilter()"
      (ngModelChange)="statusFilter.set($event)"></p-select>
    <p-select
      [options]="priorities"
      placeholder="Prioridad"
      [ngModel]="priorityFilter()"
      (ngModelChange)="priorityFilter.set($event)"></p-select>
  </div>

  <app-quick-filters
    [filters]="[
      { key: 'mine', label: 'Mis tickets' },
      { key: 'unassigned', label: 'Sin asignar' },
      { key: 'high', label: 'Alta prioridad' }
    ]"
    [active]="quickFilter()"
    (change)="quickFilter.set($event)"></app-quick-filters>

  <p-table [value]="tickets()" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Título</th>
        <th>Estado</th>
        <th>Asignado</th>
        <th>Prioridad</th>
        <th>F. creación</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr (click)="open(row)" class="clickable-row">
        <td>{{ row.title }}</td>
        <td><p-tag [value]="row.status"></p-tag></td>
        <td>{{ row.assignedTo || 'Sin asignar' }}</td>
        <td>{{ row.priority }}</td>
        <td>{{ row.createdAt | date: 'short' }}</td>
      </tr>
    </ng-template>
  </p-table>
</app-main-layout>
