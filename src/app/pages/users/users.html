<app-main-layout>
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <p class="eyebrow">Usuario</p>
      <h1>Perfil y datos</h1>
      <p class="subtitle">Mostramos y editamos la información del registro actual.</p>
    </div>
    <div class="header-actions">
      <button
        *appHasPermission="permission.UserDelete"
        pButton
        type="button"
        label="Desactivar"
        icon="pi pi-ban"
        class="p-button-danger p-button-outlined"
        (click)="deactivate()"></button>
    </div>
  </div>

  <div class="profile">
    <p-card class="profile-card" header="Perfil">
      <div class="profile-main">
        <p-avatar icon="pi pi-user" size="xlarge" shape="circle"></p-avatar>
        <div>
          <h2>{{ user.name }}</h2>
          <p class="muted">{{ user.email }}</p>
          <div class="badges">
            <p-tag [value]="user.role" severity="info"></p-tag>
            <p-tag [value]="user.status" severity="success"></p-tag>
          </div>
          <div class="muted">Asignados en este grupo: {{ assigned.length }}</div>
        </div>
      </div>
    </p-card>

    <p-card class="form-card" header="Actualizar datos">
      <form [formGroup]="form" class="form-grid" (ngSubmit)="save()">
        <div class="form-item">
          <label for="fullName">Nombre completo</label>
          <input pInputText id="fullName" formControlName="fullName" />
        </div>
        <div class="form-item">
          <label for="email">Correo</label>
          <input pInputText id="email" formControlName="email" />
        </div>
        <div class="form-item">
          <label for="username">Usuario</label>
          <input pInputText id="username" formControlName="username" />
        </div>
        <div class="form-item">
          <label for="phone">Teléfono</label>
          <input pInputText id="phone" formControlName="phone" />
        </div>
        <div class="form-item">
          <label for="address">Dirección</label>
          <input pInputText id="address" formControlName="address" />
        </div>

        <div class="form-actions">
          <button pButton type="button" label="Cancelar" class="p-button-text" (click)="form.reset(form.value)"></button>
          <button
            *appHasPermission="[permission.UsersEdit, permission.UserEdit]; appHasPermissionMode: 'any'"
            pButton
            type="submit"
            label="Guardar"
            icon="pi pi-save"
            class="p-button-success"></button>
        </div>
      </form>
    </p-card>

    <p-card class="tickets-card" header="Tickets asignados">
      <div *ngIf="assigned.length; else noTickets">
        <ul>
          <li *ngFor="let t of assigned">{{ t.title }} — {{ t.status }}</li>
        </ul>
      </div>
      <ng-template #noTickets>
        <p class="muted">Sin tickets asignados en este grupo.</p>
      </ng-template>
    </p-card>
  </div>
</app-main-layout>
